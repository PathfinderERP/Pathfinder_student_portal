name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          # Ensure dist folder exists and has content
          ls -la dist/

      - name: Deploy Backend & Transfer Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Pathfinder_student_portal
            
            # Discard any local modifications to tracked files
            git fetch --all
            git reset --hard origin/main
            git pull origin main

            echo "Updating backend..."
            cd backend
            # Fallback for venv creation if it doesn't exist
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate
            python manage.py collectstatic --noinput

      - name: Upload Build Artifacts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/home/${{ secrets.EC2_USER }}/temp_build"
          strip_components: 2

      - name: Finalize Frontend Deploy & Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Moving files to web root..."
            sudo rm -rf /var/www/frontend/*
            sudo cp -r ~/temp_build/* /var/www/frontend/
            rm -rf ~/temp_build

            echo "Ensuring Redis is installed and running on AWS..."
            # Non-interactive install to skip prompts
            sudo DEBIAN_FRONTEND=noninteractive apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y redis-server
            sudo systemctl enable redis-server.service
            sudo systemctl start redis-server.service

            echo "Ensuring Nginx allows large uploads and handles compression..."
            # Add client_max_body_size if not present
            if ! sudo grep -q "client_max_body_size" /etc/nginx/nginx.conf; then
              sudo sed -i '/http {/a \    client_max_body_size 100M;' /etc/nginx/nginx.conf
            else
              sudo sed -i 's/client_max_body_size [0-9]*[MG];/client_max_body_size 100M;/g' /etc/nginx/nginx.conf
            fi

            # Enable Nginx Gzip for faster frontend (JS/CSS) delivery
            if ! sudo grep -q "gzip_types" /etc/nginx/nginx.conf; then
               sudo sed -i '/http {/a \    gzip on;\n    gzip_comp_level 5;\n    gzip_min_length 256;\n    gzip_proxied any;\n    gzip_vary on;\n    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;' /etc/nginx/nginx.conf
            fi

            echo "Restarting services..."
            sudo systemctl restart gunicorn
            sudo systemctl restart nginx
            
            echo "Deployment completed successfully! Redis and Compression are now active."
